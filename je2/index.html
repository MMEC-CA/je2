<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicky buttons</title>
    <script>
      function btnClick(btn) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 8);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      }
    </script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 24px;
        background: #111;
      }
      button {
        width: 120px;
        height: 60px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        transition: transform 0.1s, opacity 0.1s;
        text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      }
      button:hover { opacity: 0.85; transform: scale(1.05); }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
<button style="background:#e74c3c" onclick="btnClick(this)">Red</button>
    <button style="background:#e67e22" onclick="btnClick(this)">Orange</button>
    <button style="background:#f1c40f;color:#333" onclick="btnClick(this)">Yellow</button>
    <button style="background:#2ecc71" onclick="btnClick(this)">Green</button>
    <button style="background:#1abc9c" onclick="btnClick(this)">Teal</button>
    <button style="background:#3498db" onclick="btnClick(this)">Blue</button>
    <button style="background:#2980b9" onclick="btnClick(this)">Dark Blue</button>
    <button style="background:#9b59b6" onclick="btnClick(this)">Purple</button>
    <button style="background:#8e44ad" onclick="btnClick(this)">Violet</button>
    <button style="background:#e91e63" onclick="btnClick(this)">Pink</button>
    <button style="background:#ff5722" onclick="btnClick(this)">Deep Orange</button>
    <button style="background:#4caf50" onclick="btnClick(this)">Lime Green</button>
    <button style="background:#00bcd4" onclick="btnClick(this)">Cyan</button>
    <button style="background:#673ab7" onclick="btnClick(this)">Indigo</button>
    <button style="background:#795548" onclick="btnClick(this)">Brown</button>
    <button style="background:#607d8b" onclick="btnClick(this)">Slate</button>
    <button style="background:#f06292" onclick="btnClick(this)">Rose</button>
    <button style="background:#aed581;color:#333" onclick="btnClick(this)"></button>
    <button style="background:#ff8f00" onclick="btnClick(this)">Amber</button>
    <button style="background:#26c6da" onclick="btnClick(this)">Sky</button>
  </body>
</html>
