<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicky buttons</title>
    <script>
      function btnClick(btn) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 8);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      }
    </script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 24px;
        background: #111;
      }
      button {
        width: 120px;
        height: 60px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        transition: transform 0.1s, opacity 0.1s;
        text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      }
      button:hover { opacity: 0.85; transform: scale(1.05); }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
<button style="background:#f9f9f9" onclick="btnClick(this)">  </button>

    <button style="background:#ffffff;color:#333" onclick="btnClick(this)">   </button>
