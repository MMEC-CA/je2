<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Buttons</title>
    <script>
      function playClick() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 8);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      }

      function explode(btn) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const dur = 1.2;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();

        btn.style.transition = 'transform 0.1s, opacity 0.6s, background 0.1s';
        btn.style.background = '#ff4400';
        btn.style.transform = 'scale(3)';
        btn.style.opacity = '0';
        btn.disabled = true;

        const emojis = ['💥','🔥','✨','💣'];
        for (let i = 0; i < 12; i++) {
          const p = document.createElement('span');
          p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          p.style.cssText = `position:fixed;font-size:2rem;pointer-events:none;
            left:${btn.getBoundingClientRect().left + 40}px;
            top:${btn.getBoundingClientRect().top + 20}px;
            transition:transform 0.8s ease-out,opacity 0.8s;opacity:1;`;
          document.body.appendChild(p);
          const angle = (i / 12) * 2 * Math.PI;
          const dist = 80 + Math.random() * 80;
          requestAnimationFrame(() => {
            p.style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
            p.style.opacity = '0';
          });
          setTimeout(() => p.remove(), 900);
        }

        setTimeout(() => btn.remove(), 700);
      }

      let points = 0;
      let totalClicks = 0;

      function spawnDuck() {
        const duck = document.createElement('div');
        const ducks = ['🦆','🐥','🐧','🦉'];
        duck.textContent = ducks[Math.floor(Math.random() * ducks.length)];
        const fromLeft = Math.random() < 0.5;
        const top = 20 + Math.random() * (window.innerHeight - 80);
        duck.style.cssText = `position:fixed;font-size:2.5rem;top:${top}px;
          ${fromLeft ? 'left:-60px' : 'right:-60px'};
          transition:transform 4s linear;z-index:200;pointer-events:none;
          transform:scaleX(${fromLeft ? 1 : -1});`;
        document.body.appendChild(duck);
        requestAnimationFrame(() => {
          duck.style.transform = `scaleX(${fromLeft ? 1 : -1}) translateX(${fromLeft ? window.innerWidth + 120 : -(window.innerWidth + 120)}px)`;
        });
        setTimeout(() => duck.remove(), 4200);
      }

      function updateScore() {
        document.getElementById('score').textContent = 'Points: ' + points;
      }

      function gameOver() {
        points = 0;
        updateScore();
        const overlay = document.getElementById('gameover');
        overlay.style.display = 'flex';
        setTimeout(() => overlay.style.display = 'none', 2000);
      }

      function btnClick(btn) {
        if (btn === dangerBtn && Math.random() < 0.5) {
          explode(btn);
          gameOver();
        } else {
          const count = (btn._clicks = (btn._clicks || 0) + 1);
          if (count > 80) {
            explode(btn);
            gameOver();
          } else {
            playClick();
            points++;
            totalClicks++;
            if (totalClicks % 10 === 0) spawnDuck();
            updateScore();
          }
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        const btns = document.querySelectorAll('button');
        window.dangerBtn = btns[Math.floor(Math.random() * btns.length)];
        setInterval(() => {
          if (!dangerBtn) return;
          dangerBtn.style.background = '#ff0000';
          setTimeout(() => { dangerBtn.style.background = '#ffffff'; }, 1000);
        }, 3 * 60 * 1000);
      });
    </script>

      button {
        width: 80px;
        height: 80px;
        border: none;
        border-radius: 50%;
        font-size: 14px;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        transition: transform 0.1s, opacity 0.1s;
        text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      }
      button:hover { opacity: 0.85; transform: scale(1.05); }
      button:active { transform: scale(0.96); }
      #score {
        position: fixed;
        top: 16px;
        right: 24px;
        color: #fff;
        font-size: 22px;
        font-weight: bold;
        font-family: sans-serif;
        z-index: 10;
      }
      #gameover {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        color: #ff4400;
        font-size: 64px;
        font-weight: bold;
        font-family: sans-serif;
        align-items: center;
        justify-content: center;
        z-index: 100;
